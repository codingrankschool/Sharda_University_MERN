<!DOCTYPE html>
<html lang="en">
<head>
    <title>Image Element</title>
</head>
<body>

    <!-- Image Element -->
     <img src="./image.png" alt="This is image">
     <img src="./image.png" alt="This is image" width="200px"  height="200px">

     <img src="./image.png" alt="This is image" width="100%" title="sdlf">

     <figure> 
        <img src="./image.png"> 
        <figcaption> 
        Beautiful Nature 
        </figcaption> 
    </figure>
    
</body>
</html>
