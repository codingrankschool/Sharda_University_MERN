<!DOCTYPE html>
<html lang="en">
<head>
    <title>Anchor or Hyper Text or Link Element</title>
</head>
<body>

    <!-- Anchor or Hyper Text or Link Element
    - To make plain text or images as clickable or hypertext or link. 
    -->

    <a href="">
      I'm link
    </a>
    <br>
    <br>

    <!-- href is attribute which is mendatory in anchor element where we can define:
    any resources link
    image
    document
    other page
    internal page
    others 
    -->

    <!-- Let's create simple link to image-->

    <a href="./image.png">Image</a>

    <br>
    <!-- Let's connect to other site -->
     <a href="https://www.flipkart.com/">flipkart</a>

     <br>
     <!-- link to attach internal page -->
     <a href="./myBlogPage.html">Blog Page</a>
    
</body>
</html>
