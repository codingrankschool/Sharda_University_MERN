<!DOCTYPE html>
<html lang="en">
    <head>
    
        <title>Input Element</title>
    </head>
    <body>

        <!-- FOrm is collection of input element and through these input we take data from users -->

        <input type="text">

        <!-- I want to change the type of input box, then need to do changes in its type attribute value -->

        <br>

        <input type="text">
        <br>
        <input type="number">
        <br>
        <input type="search">
        <br>
        <input type="date">
        <br>
        <input type="email">
        <br>
        <input type="button" value="Submit">

        <!-- value vs placeholder -->

        <!-- 
        
        value -  its actual value your entering or keeping inside input box
        placeholder - its a dummy text used for suggestion
        -->

        <br>
        <input type="text" placeholder="Enter Your Name">
        <br>
        <input type="text" value="Enter Your Name">
        
    </body>
</html>
