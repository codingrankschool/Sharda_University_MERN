<!DOCTYPE html>
<html lang="en">
<head>
    <title>Anchor Element Attributes</title>
</head>
<body>

    <!-- Note:
    Particular attribute make particular element for functional compare to default state 
    -->

    <!-- 
    target attribute - decides where to open resource
    value:
    _self - open in same browser tab
    -->

    <a target="_self" href="./myBlogPage.html">Blog self</a>

    <br>

    <a target="_blank" href="./myBlogPage.html">Blog blank</a>

    <!-- More attributes: -->

    <br>

    <a href="https://google.com" 
    target="_blank" 
    rel="noopener noreferrer"> 
    Google 
    </a> 

    <br>

    
    <a href="https://google.com" 
    target="_blank" 
    rel="Google"> 
    Google 
    </a> 

    <br>

    <a href="https://google.com" 
    target="_blank" 
    title="Google"> 
    Google 
    </a> 

    <br>

     <a href="./Anand_Singh_Yadav_Resume (3).pdf" 
    target="_blank" 
    title="Anand Resume"
    download="myresume"
    > 
    Resume 
    </a> 

    
    
</body>
</html>
