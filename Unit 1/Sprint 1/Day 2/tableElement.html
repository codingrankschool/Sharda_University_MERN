<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Table Element</title>
    </head>
    <body>

        <!-- Table Element
        To present the plain text in the rows and columns

        Table = html in term of structure
        HTML   TABLE
        HEAD   HEAD
        BODY   BODY

        table attributes:
        border
        cellpadding
        cellspacing
        -->
        <table border="1" cellpadding="15" cellspacing="10">

            <caption>Student Details Table</caption>

            <!-- here we define column names -->
            <thead  bgcolor="red">
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Address</th>
                </tr>
            </thead>

            <!-- column values row wise -->
            <tbody  bgcolor="yellow">
               <!-- first row -->
                <tr>
                     <td>Albert</td>
                     <td>albert@gmail.com</td>
                     <td>Noida</td>
               </tr>

               <!-- second row -->
                <tr>
                     <td>Rakesh</td>
                     <td>rakesh@gmail.com</td>
                     <td>Delhi</td>
               </tr>

            </tbody>
        </table>
        
    </body>
</html>
