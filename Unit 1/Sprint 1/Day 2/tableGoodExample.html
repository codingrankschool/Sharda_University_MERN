<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Table Element Good Example</title>
    </head>
    <body>

        <table border="1">
    <caption>
        Student Details
    </caption>
    <thead>
        <tr>
        <th>Name</th>
        <th>Course</th>
        <th>Fee</th>
        </tr>
    </thead>
    <tbody>
        <tr>
        <td>Anand</td>
        <td>MERN</td>
        <td>25000</td>
        </tr>
        <tr>
        <td>Rahul</td>
        <td>Java</td>
        <td>20000</td>
        </tr>
    </tbody>
    <tfoot>
        <tr>
        <td colspan="2">Total Students</td>
        <td>2</td>
        </tr>
    </tfoot>
    </table>
        
    </body>
</html>
