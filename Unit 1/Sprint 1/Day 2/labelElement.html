<!DOCTYPE html>
<html lang="en">
<head>
    <title>block and inline Element</title>
</head>
<body>

    <!-- There are two types of elements in case of block and inline Element:
    1. Block Element: they block entre line 
    Exmple - list, heading, p, div, others
    2. Inline Element : they block line till their presence
    Example - span, label, input, others
    -->


    <!-- <h1>I'm heading one</h1>
    <span>helsllso</span>
    <br>
    <input type="text"> -->

    <!-- label:
    while working form's input to show what to enter in the input box:
    we generaly use in this label because it is inline element and has extra attribute for 
    -->

    <!-- horizontal representation of input element -->
    <label for="employee-name">Enter Your Name</label>
    <input type="text">
     <hr>
    <!-- veritical -->
     <p>Enter Your Name</p>
     <input type="text">
    
</body>
</html>
