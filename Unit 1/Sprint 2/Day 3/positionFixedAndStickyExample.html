<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position Fixed and Sticky Example</title>

    <style>

        *{
            margin: 0;
            padding: 0;
        }

        #box{
            border: 1px solid red;
            width: 90%;
            margin: auto;
            height: 2000px;

        }

        #box>div{
            border: 1px solid teal;
            padding: 10px;
            position: fixed;
            bottom: 0;
            margin: 10px;
            width: 50%;
        }

    </style>

</head>
<body>

    <div id="box">
        <div>Fixed</div>
    </div>

    
    
</body>
</html>
