<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- Below meta element is repsonsible to allow your webpage for responsive design -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Introduction To MEDIA QUERY</title>

    <style>

        /* Small Screens */
        
        @media all and (max-width:700px) {

            body{
                background-color: red;
            }
            
        }

       /* Medium Screen */
        @media all and (min-width:701px) and (max-width:1023px) {

            body{
                background-color: teal;
            }
            
        }

        /* Large Screen */
        @media all and (min-width:1024px) {

            body{
                background-color: yellow;
            }
            
        }

    </style>

</head>
<body>
    
</body>
</html>
