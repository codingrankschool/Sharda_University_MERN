<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Position Property</title>
    <!-- To attach your external css -->
    <link rel="stylesheet" href="">

    <style>


        div{

            margin: 10px;
            width:100px;
            height: 100px;
            font-size: 24px;
            text-align: center;

        }


        div:nth-child(1){
            background-color: red;
            position: relative;
            left: 20px;
            top: 50px;
            z-index: 1;
        }

        div:nth-child(2){
            background-color: teal;
            position: relative;
            z-index: 2;
        }

        div:nth-child(3){
            background-color: yellow;
            
        }

        div:nth-child(4){
            background-color: green;
            
        }



    </style>

</head>
<body>

    <!-- Why Position:
    
    Note: Every HTML Element/Tag having position as static by default.
    Other Values:
    relative
    absolute
    sticky
    fixed

    sub position properties:
    left
    right
    top
    bottom
    z-index

    Note: Sub Properties don't work when position is static and work well in other cases.
    
    -->
    
    <div>1</div>
    <div>2</div>
    <div>3</div>
    <div>4</div>

</body>
</html>
