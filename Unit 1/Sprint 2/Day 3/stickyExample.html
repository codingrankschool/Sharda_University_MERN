<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stickey Example</title>


    <style>

        *{
            margin: 0;
            padding: 0;
        }

        .title{
            background-color: teal;
            color: white;
            padding: 20px;
            position: sticky;
            top: 0;
        }

        .content{
            height: 800px;
        }

    </style>

</head>
<body>

    <p class="title">HTML</p>
    <p class="content">HTML Content.....</p>

    <p class="title">CSS</p>
    <p class="content">CSS Content.....</p>

    <p class="title">JS</p>
    <p class="content">JS Content.....</p>
    
</body>
</html>
