<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tag Selector</title>

    <style>

        *{
            margin: 0;
        }
        
        div{
            background-color: red;
            padding: 10px;
            color: white;
            font-size: 23px;
        }
        p{
            color: teal;
        }

        /* Group Selector */
        p, span{
            background-color: yellow;
        }

    </style>

</head>
<body>

    <div>box</div>
    <p>Para 1</p>
    <p>Para 2</p>
    <p>Para 3</p>


    <input type="text">
    <br>
    <input type="button" value="Submit">
    <br>
    <span>Hello Span</span>
    
</body>
</html>
