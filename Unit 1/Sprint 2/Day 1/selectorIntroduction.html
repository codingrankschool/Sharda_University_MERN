<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Introuduction to Selector</title>

    <!-- Internal CSS -->
     <style>

        h1{
            background-color: red;
            margin: 0;
            padding: 0;
        }

     </style>

</head>
<body>

    <!-- Without Selector - There is no way to use internal and external css
    
    Problem with Inline CSS:
    1. Maintanability
    2. Reusability
    3. Limitation in Global Styling


    Solution: Selectors

    We have following selectors:
    Universal/Global Selector: *
    Tag/Element Selector: html elements/tags - h1, p, h2, span, div
    Id Selector: #
    Class Selector: .
    Attribute Selector: input[type="text"]
    Group Selector


    Goal: styling html element:
    Above selectors using we can select html element for giving style.


    How: Where do we use these selectors?
    Ansswer - Internal or External CSS

    Internal CSS:
    We use css seperatly inside html file to style particular html element such way of sepertly styling is known as internal styling

    we can use this seperate css inside style element which exists inside head element.

    
    -->
    
</body>
</html>
