<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Child Grow Property Example</title>


    <!-- flex-shrink
    - It shrinks the width of child box according to parent continaer

    default: 1
    Note: It doesn't negative value
    
    other values:
    
    1, 2, 3, 4, 5, 6
    -->

    <style>

        #container{
            border: 1px solid red;
            padding: 10px;
            display: flex;
            align-items: baseline;

        }

        #container>div{
            border: 1px solid teal;
            padding: 10px;
            width: 60px;
            flex-shrink: 1;
        }

        #container>div:nth-child(1){
            flex-shrink: 4;
        }

        #container>div:nth-child(2){
        }

        #container>div:nth-child(3){
            
        }

        #container>div:nth-child(4){
            
        }

    </style>

</head>
<body>

    <div id="container">
        <div>Box 1</div>
        <div>Box 2</div>
        <div>Box 3</div>
        <div>Box 4</div>
    </div>
    
</body>
</html>
