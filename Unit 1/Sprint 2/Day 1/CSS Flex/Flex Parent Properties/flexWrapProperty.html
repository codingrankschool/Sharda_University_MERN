<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Property: justify-content property</title>


    <!-- flex-wrap
    - wrap elements/childs according available space in the container

    default: onwrap
    
    other values:
    
    wrap
    wrap-reverse
    -->

    <style>

        #container{
            border: 1px solid red;
            padding: 10px;
            display: flex;
            flex-wrap: wrap;

        }

        #container>div{
            border: 1px solid teal;
            padding: 10px;
            width: 200px;
            height: 200px;
            flex-shrink: 0;
        }

    </style>

</head>
<body>

    <!-- Flex Parent Property:
     - They are being used in the parent container
     1. Justify-content - this
     2. flex-direction
     4. flex-wrap
     5. align-item
     6. align-content
    -->

    <div id="container">
        <div>Box 1</div>
        <div>Box 2</div>
        <div>Box 3</div>
        <div>Box 4</div>
        <div>Box 5</div>
        <div>Box 6</div>
        <div>Box 7</div>
        <div>Box 8</div>
        <div>Box 9</div>
        <div>Box 10</div>
        <div>Box 11</div>
        <div>Box 12</div>
    </div>
    
</body>
</html>
