<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Property: justify-content property</title>


    <!-- justify-content
    - Align elements/childs in main-axis
    default: flex-start
    other values:
    
    center
    flex-end, end
    space-between
    space-around
    space-evenly
    -->

    <style>

        #container{
            border: 1px solid red;
            padding: 10px;
            display: flex;
            /* gap: 10px; */

            justify-content: space-evenly;

        }

        #container>div{
            border: 1px solid teal;
            padding: 10px;
        }

    </style>

</head>
<body>

    <!-- Flex Parent Property:
     - They are being used in the parent container
     1. Justify-content - this
     2. flex-direction
     4. flex-wrap
     5. align-item
     6. align-content
    -->

    <div id="container">
        <div>Box 1</div>
        <div>Box 2</div>
        <div>Box 3</div>
        <div>Box 4</div>
    </div>
    
</body>
</html>
