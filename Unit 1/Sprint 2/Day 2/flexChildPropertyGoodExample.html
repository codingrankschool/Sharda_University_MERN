<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Child Property Good Example</title>

    <style> 

    #container{
        border: 1px solid red;
        padding: 10px;
        height: 90vh;
        width: 90%;
        margin: auto;
        display: flex;
        flex-direction: column;

    }

    #container>div{
        border: 1px solid teal;
        padding: 10px;
        flex-grow: 1;
    }

    #container>div:first-child{

    }

    #container>div:last-child{
        flex-grow: 3;
        display: flex;
        justify-content: center;
        gap: 10px;
        
    }

    #container>div:last-child>div{
        border: 1px solid red;
        padding: 10px;
        width:160px;
        border-radius: 10px;

    }


    </style>

</head>
<body>

    <div id="container">
        <div></div>
        <div>

            <div></div>
            <div></div>
            <div></div>

        </div>
    </div>
    
</body>
</html>
